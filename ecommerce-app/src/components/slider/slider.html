<!-- Slider -->
<div id="heroSlider" class="carousel slide carousel-fade" data-bs-ride="carousel">
  <!-- Indicators -->
  <div class="carousel-indicators">
    <button type="button" data-bs-target="#heroSlider" data-bs-slide-to="0" class="active"></button>
    <button type="button" data-bs-target="#heroSlider" data-bs-slide-to="1"></button>
    <button type="button" data-bs-target="#heroSlider" data-bs-slide-to="2"></button>
  </div>

  <!-- Slides -->
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="1.jpg" class="d-block w-100 slider-img" alt="Slide 1" />
      <div class="carousel-caption">
        <span class="slide-tag">New Arrival</span>
        <h2 class="slide-title">Discover the Collection</h2>
        <p class="slide-desc">Handpicked pieces crafted for everyday elegance.</p>
        <a href="#" class="slide-btn">Shop Now</a>
      </div>
    </div>

    <div class="carousel-item">
      <img src="2.jpg" class="d-block w-100 slider-img" alt="Slide 2" />
      <div class="carousel-caption">
        <span class="slide-tag">Best Sellers</span>
        <h2 class="slide-title">Timeless Essentials</h2>
        <p class="slide-desc">The styles everyone is reaching for this season.</p>
        <a href="#" class="slide-btn">Explore Now</a>
      </div>
    </div>

    <div class="carousel-item">
      <img src="8.jpg" class="d-block w-100 slider-img" alt="Slide 3" />
      <div class="carousel-caption">
        <span class="slide-tag">Limited Offer</span>
        <h2 class="slide-title">Up to 40% Off</h2>
        <p class="slide-desc">Don't miss out on our exclusive seasonal sale.</p>
        <a href="#" class="slide-btn">Grab the Deal</a>
      </div>
    </div>
  </div>

  <!-- Prev / Next Controls -->
  <button
    class="carousel-control-prev custom-control"
    type="button"
    data-bs-target="#heroSlider"
    data-bs-slide="prev"
  >
    <span class="control-icon">&#8592;</span>
  </button>
  <button
    class="carousel-control-next custom-control"
    type="button"
    data-bs-target="#heroSlider"
    data-bs-slide="next"
  >
    <span class="control-icon">&#8594;</span>
  </button>
</div>
